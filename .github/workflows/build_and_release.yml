name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --add-data "logo.png;." --add-data "update_pubkey.pem;." main.py

      - name: Calculate SHA256
        id: hash
        run: |
          $path = "dist\\main.exe"
          $h = Get-FileHash $path -Algorithm SHA256
          Write-Host "sha256=$($h.Hash)" >> $env:GITHUB_OUTPUT

      - name: Generate manifest and sign
        env:
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: |
          $sha = ${{ steps.hash.outputs.sha256 }}
          $asset_url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/main.exe"
          python scripts\generate_manifest_and_sign.py --version ${{ github.ref_name }} --asset_url $asset_url --sha256 $sha --signing_key "$env:SIGNING_PRIVATE_KEY" --out manifest.json

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset (exe)
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/main.exe
          file_name: main.exe
          tag: ${{ github.ref_name }}

      - name: Upload manifest
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: manifest.json
          file_name: manifest.json
          tag: ${{ github.ref_name }}
